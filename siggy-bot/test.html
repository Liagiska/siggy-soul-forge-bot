<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siggy Soul Forge - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 136, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .chat-container {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
            border-radius: 20px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.8),
                0 0 0 2px #00ff88,
                0 0 30px rgba(0, 255, 136, 0.3);
            width: 100%;
            max-width: 700px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 50%, #009944 100%);
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .chat-header::before {
            content: '⚡';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            animation: lightning 2s infinite;
        }
        
        .chat-header::after {
            content: '⚡';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            animation: lightning 2s infinite 1s;
        }
        
        @keyframes lightning {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.3; transform: translateY(-50%) scale(1.2); }
        }
        
        .chat-header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: #000;
            text-shadow: 
                2px 2px 0px rgba(255,255,255,0.3),
                4px 4px 0px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        
        .chat-header p {
            font-size: 14px;
            color: #000;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }
        
        .siggy-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border-radius: 50%;
            margin: -60px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #00ff88;
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.5);
            position: relative;
            z-index: 2;
            animation: glow 2s infinite;
            overflow: hidden;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 8px 20px rgba(0, 255, 136, 0.5); }
            50% { box-shadow: 0 8px 30px rgba(0, 255, 136, 0.8); }
        }
        
        .siggy-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #0a0a0a;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 3px solid #00ff88;
            box-shadow: 0 4px 10px rgba(0, 255, 136, 0.3);
            overflow: hidden;
            background: #1a1a1a;
        }
        
        .message.siggy .message-avatar {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #00cc6a, #009944);
            order: 1;
        }
        
        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .message-content {
            max-width: 65%;
            padding: 15px 20px;
            border-radius: 15px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .message.siggy .message-content {
            background: #1a1a1a;
            border-bottom-left-radius: 5px;
            color: #e0e0e0;
            border: 2px solid #00ff88;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border-bottom-right-radius: 5px;
            border: 2px solid #00ff88;
        }
        
        .chat-input {
            padding: 20px;
            background: #0d0d0d;
            border-top: 2px solid #00ff88;
            display: flex;
            gap: 10px;
            position: relative;
        }
        
        .chat-input::before {
            content: '🐱';
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            z-index: 1;
        }
        
        .chat-input input {
            flex: 1;
            padding: 15px 20px 15px 50px;
            border: 2px solid #00ff88;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            background: #1a1a1a;
            color: #e0e0e0;
            transition: all 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #00cc6a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: scale(1.02);
        }
        
        .chat-input input::placeholder {
            color: #666;
        }
        
        .chat-input button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 900;
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .chat-input button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.6);
        }
        
        .chat-input button:active {
            transform: translateY(-1px);
        }
        
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: #1a1a1a;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            max-width: 70%;
            border: 2px solid #00ff88;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin: 0 3px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        .decorative-elements {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .grid-line {
            position: absolute;
            background: rgba(0, 255, 136, 0.1);
        }
        
        .grid-line.horizontal {
            width: 100%;
            height: 1px;
        }
        
        .grid-line.vertical {
            width: 1px;
            height: 100%;
        }
        
        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #00cc6a, #009944);
        }
    </style>
</head>
<body>
    <!-- Decorative Elements -->
    <div class="decorative-elements">
        <div class="grid-line horizontal" style="top: 10%;"></div>
        <div class="grid-line horizontal" style="top: 30%;"></div>
        <div class="grid-line horizontal" style="top: 50%;"></div>
        <div class="grid-line horizontal" style="top: 70%;"></div>
        <div class="grid-line horizontal" style="top: 90%;"></div>
        <div class="grid-line vertical" style="left: 20%;"></div>
        <div class="grid-line vertical" style="left: 40%;"></div>
        <div class="grid-line vertical" style="left: 60%;"></div>
        <div class="grid-line vertical" style="left: 80%;"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h1>SIGGY</h1>
            <p>SOUL FORGE BOT ⚡</p>
        </div>
        
        <div class="siggy-avatar">
            <img src="images/siggy-avatar.png" alt="Siggy">
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message siggy">
                <div class="message-avatar">
                    <img src="images/siggy-avatar.png" alt="Siggy">
                </div>
                <div class="message-content">
                    <strong>MEOW~ mortal!</strong> ⚡<br><br>
                    Siggy has been awakened at the soul forge!<br><br>
                    Ask me about Ritual, crypto, life advice, or just chat! I'm here to chaos with you! 😼
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="chat-input">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type a message for Siggy..." 
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            // Add user message
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user';
            userMsgDiv.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">${escapeHtml(message)}</div>
            `;
            chatMessages.appendChild(userMsgDiv);
            
            messageInput.value = '';
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            sendBtn.disabled = true;
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                
                // Add Siggy's response with custom avatar
                const siggyMsgDiv = document.createElement('div');
                siggyMsgDiv.className = 'message siggy';
                siggyMsgDiv.innerHTML = `
                    <div class="message-avatar">
                        <img src="images/siggy-avatar.png" alt="Siggy">
                    </div>
                    <div class="message-content">${escapeHtml(data.response)}</div>
                `;
                chatMessages.appendChild(siggyMsgDiv);
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
            } catch (error) {
                console.error('Error:', error);
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                
                const errorMsgDiv = document.createElement('div');
                errorMsgDiv.className = 'message siggy';
                errorMsgDiv.innerHTML = `
                    <div class="message-avatar">
                        <img src="images/siggy-avatar.png" alt="Siggy">
                    </div>
                    <div class="message-content">
                        ⚠️ Siggy is experiencing dimensional interference... 
                        try again later! 🔮
                    </div>
                `;
                chatMessages.appendChild(errorMsgDiv);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        messageInput.focus();
    </script>
</body>
</html>
